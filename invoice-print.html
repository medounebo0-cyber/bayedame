<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Facture — Medoune Bo</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f3e3bf;
      --paper-deep: #e8d5a3;
      --ink: #0a0a0a;
      --ink-dim: #4a4540;
      --ink-soft: #7a7368;
      --line: rgba(10, 10, 10, 0.12);
      --line-strong: rgba(10, 10, 10, 0.65);
      --green: #047857;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2a2522;
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      line-height: 1.5;
      padding: 40px 20px;
      min-height: 100vh;
    }

    .controls {
      max-width: 800px;
      margin: 0 auto 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #f2ede4;
      flex-wrap: wrap;
      gap: 12px;
    }
    .controls h1 { font-size: 14px; font-weight: 500; letter-spacing: 0.05em; }
    .controls__actions { display: flex; gap: 8px; }
    .btn {
      padding: 10px 18px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      border: none;
      text-decoration: none;
      display: inline-block;
      font-weight: 500;
    }
    .btn-print { background: #c8743a; color: #f2ede4; }
    .btn-print:hover { opacity: 0.9; }
    .btn-back { background: transparent; color: #f2ede4; border: 1px solid rgba(242,237,228,0.3); }
    .btn-back:hover { background: rgba(242,237,228,0.1); }

    .paper {
      max-width: 800px;
      margin: 0 auto;
      background: var(--paper);
      color: var(--ink);
      padding: 48px 56px 40px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
      position: relative;
      min-height: 1100px;
      font-family: 'DM Sans', 'Inter', sans-serif;
      overflow: hidden;
    }

    /* === TAMPON PAYÉE === */
    .stamp-paid {
      position: absolute;
      top: 280px;
      right: 60px;
      transform: rotate(-12deg);
      padding: 16px 32px;
      border: 4px solid var(--green);
      color: var(--green);
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 36px;
      letter-spacing: 0.08em;
      border-radius: 8px;
      background: rgba(4, 120, 87, 0.05);
      opacity: 0.85;
      z-index: 5;
      box-shadow: inset 0 0 0 2px var(--green);
      text-transform: uppercase;
      pointer-events: none;
    }
    .stamp-paid::before {
      content: '';
      position: absolute;
      inset: -2px;
      border: 2px solid var(--green);
      border-radius: 6px;
    }

    .doc-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 36px;
    }
    .doc-head__left { display: flex; flex-direction: column; gap: 8px; }
    .doc-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 76px;
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.04em;
      color: var(--ink);
    }
    .doc-num {
      display: inline-block;
      padding: 6px 14px;
      border: 1.5px solid var(--ink);
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      width: fit-content;
      margin-top: 4px;
    }
    .doc-sun {
      width: 64px;
      height: 64px;
      flex-shrink: 0;
      margin-top: 12px;
    }

    .dates { margin-bottom: 28px; }
    .date-line { font-size: 12px; margin-bottom: 4px; }
    .date-line strong { font-weight: 600; }

    .parties {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      margin-bottom: 32px;
    }
    .party h3 { font-size: 12px; font-weight: 700; margin-bottom: 6px; }
    .party p { line-height: 1.65; font-size: 12px; }
    .party--right { text-align: right; }
    .party--right h3 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--ink-dim);
      margin-bottom: 8px;
    }

    .items {
      width: 100%;
      border-collapse: collapse;
    }
    .items thead th {
      background: var(--ink);
      color: var(--paper);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 11px 14px;
      text-align: left;
    }
    .items thead th:nth-child(2),
    .items thead th:nth-child(3) { text-align: center; }
    .items thead th:nth-child(4) { text-align: right; }
    .items tbody td {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      vertical-align: middle;
    }
    .items tbody td:nth-child(2),
    .items tbody td:nth-child(3) { text-align: center; font-variant-numeric: tabular-nums; }
    .items tbody td:nth-child(4) {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }
    .item-desc { display: flex; flex-direction: column; gap: 2px; }
    .item-desc__title {
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 12px;
    }
    .item-desc__sub {
      font-size: 11px;
      color: var(--ink-soft);
      line-height: 1.4;
    }

    .total-bar {
      display: flex;
      justify-content: flex-end;
      align-items: stretch;
      margin: 8px 0 8px 35%;
      background: var(--ink);
      color: var(--paper);
    }
    .total-bar__label {
      padding: 14px 18px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      flex: 1;
      text-align: right;
    }
    .total-bar__amount {
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .vat-mention {
      text-align: right;
      font-size: 10px;
      font-style: italic;
      color: var(--ink-soft);
      margin-bottom: 18px;
    }

    .totals-extras {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin: 8px 0 8px 50%;
      padding: 10px 18px 0;
    }
    .totals-extras__row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }
    .totals-extras__row span:last-child { font-variant-numeric: tabular-nums; font-weight: 600; }

    /* === BLOC PAIEMENTS === */
    .payments {
      margin: 28px 0 0;
      padding: 18px;
      background: rgba(4, 120, 87, 0.06);
      border-left: 3px solid var(--green);
      border-radius: 0 6px 6px 0;
    }
    .payments h3 {
      font-size: 12px;
      font-weight: 700;
      color: var(--green);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .payment-row {
      display: grid;
      grid-template-columns: 110px 1fr 1fr auto;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(4, 120, 87, 0.15);
      font-size: 12px;
      align-items: center;
    }
    .payment-row:last-child { border-bottom: none; }
    .payment-row__amount {
      text-align: right;
      font-weight: 700;
      color: var(--green);
      font-variant-numeric: tabular-nums;
    }
    .payment-summary {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 2px solid var(--green);
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      font-size: 13px;
      color: var(--green);
    }
    .payment-summary--remaining {
      color: var(--ink);
      margin-top: 4px;
      border-top: none;
      padding-top: 4px;
    }

    .terms {
      margin-top: 28px;
    }
    .terms h3 {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .terms ul { list-style: none; padding-left: 0; }
    .terms li {
      font-size: 12px;
      line-height: 1.7;
      padding-left: 18px;
      position: relative;
      margin-bottom: 2px;
    }
    .terms li::before {
      content: '•';
      position: absolute;
      left: 0;
      font-size: 14px;
      line-height: 1.4;
    }

    .notes {
      margin-top: 20px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      font-size: 11px;
      font-style: italic;
      color: var(--ink-soft);
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .doc-foot {
      margin-top: 48px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      text-align: center;
      font-size: 10px;
      color: var(--ink-soft);
      letter-spacing: 0.05em;
    }

    .state {
      max-width: 800px;
      margin: 60px auto;
      padding: 40px;
      background: var(--paper);
      color: var(--ink);
      text-align: center;
      border-radius: 8px;
    }
    .state h2 { font-size: 18px; margin-bottom: 8px; }
    .state p { color: var(--ink-dim); margin-bottom: 24px; }
    .state a { color: #a85a28; }

    @media print {
      body { background: white; padding: 0; }
      .controls { display: none; }
      .paper {
        box-shadow: none;
        max-width: none;
        padding: 18mm 16mm;
        min-height: 0;
      }
      @page { size: A4; margin: 0; }
    }

    @media (max-width: 700px) {
      body { padding: 20px 12px; }
      .paper { padding: 32px 24px; }
      .doc-title { font-size: 56px; }
      .doc-sun { width: 48px; height: 48px; }
      .parties { grid-template-columns: 1fr; gap: 24px; }
      .party--right { text-align: left; }
      .total-bar { margin-left: 0; }
      .totals-extras { margin-left: 0; }
      .payment-row { grid-template-columns: 1fr; gap: 4px; }
      .stamp-paid { font-size: 24px; padding: 10px 20px; right: 24px; top: 240px; }
      .items thead { display: none; }
      .items tbody tr { display: block; padding: 14px 0; border-bottom: 1px solid var(--line); }
      .items tbody td { display: flex; justify-content: space-between; padding: 4px 0; border: none; }
    }
  </style>
</head>
<body>

  <div class="controls">
    <h1>Aperçu de la facture</h1>
    <div class="controls__actions">
      <a class="btn btn-back" href="admin.html">← Retour Admin</a>
      <button class="btn btn-print" onclick="window.print()">🖨 Imprimer / PDF</button>
    </div>
  </div>

  <div id="content"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://bsaswpsgufyamrnrfkvw.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_E-e-dFA7UfXdZgiRL0jr5A_gVtCfjjl';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const ME = {
      name: 'MEDOUNE BO',
      phone: '+221 77-375-83-92',
      email: 'medounebo0@gmail.com',
      address: 'Dakar, Sénégal'
    };

    const METHOD_LABELS = {
      wave: 'Wave',
      orange_money: 'Orange Money',
      cash: 'Espèces',
      virement: 'Virement bancaire',
      cheque: 'Chèque',
      autre: 'Autre'
    };

    function escapeHtml(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }
    function formatCurrency(amount, currency = 'XOF') {
      const opts = { style: 'currency', currency };
      if (currency === 'XOF') { opts.minimumFractionDigits = 0; opts.maximumFractionDigits = 0; }
      try { return new Intl.NumberFormat('fr-FR', opts).format(amount); }
      catch { return amount + ' ' + currency; }
    }
    function formatDateShort(d) {
      if (!d) return '';
      const dt = new Date(d);
      return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getFullYear()).slice(-2)}`;
    }

    function renderInvoice(inv, payments) {
      const items = Array.isArray(inv.items) ? inv.items : [];
      const hasVat = Number(inv.vat_rate || 0) > 0;
      const totalLabel = hasVat ? 'TOTAL TTC' : 'TOTAL HT';
      const isPaid = inv.payment_status === 'paid';
      const totalPaid = payments.reduce((s, p) => s + Number(p.amount), 0);
      const remaining = Math.max(0, Number(inv.total) - totalPaid);

      const itemsRows = items.map(it => `
        <tr>
          <td>
            <div class="item-desc">
              <div class="item-desc__title">${escapeHtml(it.description || '')}</div>
              ${it.subtitle ? `<div class="item-desc__sub">${escapeHtml(it.subtitle)}</div>` : ''}
            </div>
          </td>
          <td>${formatCurrency(Number(it.unit_price || 0), inv.currency)}</td>
          <td>${String(Number(it.quantity || 0)).padStart(2, '0')}</td>
          <td>${formatCurrency(Number(it.quantity || 0) * Number(it.unit_price || 0), inv.currency)}</td>
        </tr>
      `).join('');

      const conditionsList = (inv.payment_terms || '')
        .split('\n').map(s => s.trim()).filter(Boolean)
        .map(s => s.replace(/^[-•*]\s*/, ''));

      const paymentsHtml = payments.length === 0 ? '' : `
        <div class="payments">
          <h3>💰 Versements reçus</h3>
          ${payments.map(p => `
            <div class="payment-row">
              <span><strong>${formatDateShort(p.received_at)}</strong></span>
              <span>${METHOD_LABELS[p.method] || p.method}</span>
              <span style="color: var(--ink-soft); font-size: 11px;">${p.reference ? 'Réf : ' + escapeHtml(p.reference) : ''}</span>
              <span class="payment-row__amount">${formatCurrency(Number(p.amount), inv.currency)}</span>
            </div>
          `).join('')}
          <div class="payment-summary">
            <span>Total versé</span>
            <span>${formatCurrency(totalPaid, inv.currency)}</span>
          </div>
          ${remaining > 0 ? `
            <div class="payment-summary payment-summary--remaining">
              <span>Reste à payer</span>
              <span>${formatCurrency(remaining, inv.currency)}</span>
            </div>
          ` : ''}
        </div>
      `;

      document.getElementById('content').innerHTML = `
        <div class="paper">
          ${isPaid ? '<div class="stamp-paid">PAYÉE</div>' : ''}

          <div class="doc-head">
            <div class="doc-head__left">
              <div class="doc-title">FACTURE</div>
              <div class="doc-num">N° ${escapeHtml(inv.invoice_number || '—')}</div>
            </div>
            <svg class="doc-sun" viewBox="0 0 64 64" aria-label="Logo Baye Dame">
              <rect width="64" height="64" rx="14" fill="#0a0a0a"/>
              <text x="32" y="44" font-family="Georgia, 'Times New Roman', serif" font-weight="300" font-style="italic" font-size="32" fill="#f3e3bf" text-anchor="middle">BD</text>
              <circle cx="50" cy="50" r="3" fill="#c8743a"/>
            </svg>
          </div>

          <div class="dates">
            <div class="date-line"><strong>Date d'émission :</strong> ${formatDateShort(inv.issue_date)}</div>
            <div class="date-line"><strong>Date d'échéance :</strong> ${formatDateShort(inv.due_date)}</div>
          </div>

          <div class="parties">
            <div class="party">
              <h3>${escapeHtml(ME.name)}</h3>
              <p>${ME.phone}<br/>${ME.email}<br/>${ME.address}</p>
            </div>
            <div class="party party--right">
              <h3>FACTURÉ À</h3>
              <p>
                <strong>${escapeHtml(inv.client_name)}</strong>
                ${inv.client_phone ? '<br/>' + escapeHtml(inv.client_phone) : ''}
                ${inv.client_email ? '<br/>' + escapeHtml(inv.client_email) : ''}
                ${inv.client_address ? '<br/>' + escapeHtml(inv.client_address) : ''}
              </p>
            </div>
          </div>

          <table class="items">
            <thead>
              <tr>
                <th>DESCRIPTION</th>
                <th>PRIX</th>
                <th>QUANTITÉ</th>
                <th>TOTAL</th>
              </tr>
            </thead>
            <tbody>${itemsRows}</tbody>
          </table>

          ${hasVat ? `
            <div class="totals-extras">
              <div class="totals-extras__row"><span>Sous-total HT</span><span>${formatCurrency(Number(inv.subtotal || 0), inv.currency)}</span></div>
              <div class="totals-extras__row"><span>TVA (${inv.vat_rate}%)</span><span>${formatCurrency(Number(inv.vat_amount || 0), inv.currency)}</span></div>
            </div>
          ` : ''}

          <div class="total-bar">
            <div class="total-bar__label">${totalLabel} :</div>
            <div class="total-bar__amount">${formatCurrency(Number(inv.total || 0), inv.currency)}</div>
          </div>

          ${!hasVat ? '<div class="vat-mention">TVA non applicable, art. 293B du CGI</div>' : ''}

          ${paymentsHtml}

          ${conditionsList.length > 0 ? `
            <div class="terms">
              <h3>Modalités de paiement</h3>
              <ul>${conditionsList.map(c => `<li>${escapeHtml(c)}</li>`).join('')}</ul>
            </div>
          ` : ''}

          ${inv.notes ? `<div class="notes">${escapeHtml(inv.notes)}</div>` : ''}

          <div class="doc-foot">
            ${escapeHtml(ME.name)} · ${ME.phone} · ${ME.email}
          </div>
        </div>
      `;
    }

    async function init() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        document.getElementById('content').innerHTML = `
          <div class="state"><h2>Connexion requise</h2><p>Tu dois être connecté à l'admin pour voir cette facture.</p><a href="admin.html">→ Page de connexion</a></div>`;
        return;
      }
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) {
        document.getElementById('content').innerHTML = `
          <div class="state"><h2>Facture introuvable</h2><p>L'URL ne contient pas d'identifiant.</p><a href="admin.html">→ Retour à l'admin</a></div>`;
        return;
      }

      const [invRes, payRes] = await Promise.all([
        supabase.from('invoices').select('*').eq('id', id).single(),
        supabase.from('payments').select('*').eq('invoice_id', id).order('received_at', { ascending: true })
      ]);

      if (invRes.error || !invRes.data) {
        document.getElementById('content').innerHTML = `
          <div class="state"><h2>Erreur</h2><p>${escapeHtml(invRes.error?.message || 'Facture introuvable')}</p><a href="admin.html">→ Retour</a></div>`;
        return;
      }

      document.title = `Facture ${invRes.data.invoice_number} — ${invRes.data.client_name}`;
      renderInvoice(invRes.data, payRes.data || []);
    }

    init();
  </script>
</body>
</html>
