<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>404 — Image non capturée · Baye Dame</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0709;
      --bg-alt: #1a0e0a;
      --fg: #fafafa;
      --fg-dim: #a8a29e;
      --accent: #f97316;
      --accent-2: #fb923c;
      --accent-3: #c2410c;
      --line: rgba(255, 255, 255, 0.08);
      --line-strong: rgba(255, 255, 255, 0.18);
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.10);
      --glass-shine: rgba(255, 255, 255, 0.18);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter Tight', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 24px;
      overflow: hidden;
      position: relative;
    }

    /* Blobs atmosphériques + grain */
    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 30% 20%, rgba(249, 115, 22, 0.30), transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(194, 65, 12, 0.20), transparent 60%);
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.06;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    }

    .wrap {
      max-width: 720px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    /* Viewfinder brackets en équerre (rappel du hero du site) */
    .vf-bracket {
      position: absolute;
      width: 40px;
      height: 40px;
      border: 1.5px solid var(--accent);
    }
    .vf-tl { top: 0; left: 0; border-right: none; border-bottom: none; }
    .vf-tr { top: 0; right: 0; border-left: none; border-bottom: none; }
    .vf-bl { bottom: 0; left: 0; border-right: none; border-top: none; }
    .vf-br { bottom: 0; right: 0; border-left: none; border-top: none; }

    .vf-frame {
      position: relative;
      padding: 60px 40px;
      border-radius: 6px;
    }

    /* HUD top : SIGNAL LOST */
    .hud-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.25em;
      color: var(--fg-dim);
      margin-bottom: 60px;
    }
    .hud-rec {
      display: inline-flex; align-items: center; gap: 8px;
      color: #c8341f;
    }
    .hud-rec__dot {
      width: 8px; height: 8px;
      background: #c8341f;
      border-radius: 50%;
      animation: pulse 1.4s infinite;
      box-shadow: 0 0 10px #c8341f;
    }
    @keyframes pulse {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.2; }
    }

    .err-code {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: clamp(100px, 22vw, 220px);
      line-height: 1;
      letter-spacing: -0.05em;
      color: var(--fg);
      margin-bottom: 20px;
      text-shadow: 0 4px 80px rgba(249, 115, 22, 0.3);
    }
    .err-code em {
      font-style: italic;
      background: linear-gradient(135deg, var(--accent-2), var(--accent), var(--accent-3));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-style: italic;
      font-size: clamp(22px, 4vw, 32px);
      line-height: 1.3;
      letter-spacing: -0.01em;
      margin-bottom: 20px;
      color: var(--fg);
    }
    h1 em {
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    p {
      color: var(--fg-dim);
      max-width: 480px;
      margin: 0 auto 36px;
      font-size: 15px;
      line-height: 1.7;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--accent-2), var(--accent), var(--accent-3));
      color: var(--bg);
      border-radius: 100px;
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.2em;
      font-weight: 600;
      transition: transform 0.3s ease, box-shadow 0.3s;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.4),
        0 8px 24px rgba(249, 115, 22, 0.4);
    }
    .cta:hover {
      transform: translateY(-2px) translateX(4px);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.4),
        0 14px 34px rgba(249, 115, 22, 0.6);
    }
    .cta svg { width: 16px; height: 16px; }

    .meta {
      margin-top: 40px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--fg-dim);
      text-transform: uppercase;
    }
    .meta span { color: var(--accent); }

    @media (max-width: 600px) {
      .vf-frame { padding: 50px 24px; }
      .vf-bracket { width: 28px; height: 28px; }
      .err-code { font-size: 96px; }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="vf-frame">
      <span class="vf-bracket vf-tl"></span>
      <span class="vf-bracket vf-tr"></span>
      <span class="vf-bracket vf-bl"></span>
      <span class="vf-bracket vf-br"></span>

      <div class="hud-top">
        <div class="hud-rec">
          <span class="hud-rec__dot"></span>
          <span>SIGNAL PERDU</span>
        </div>
        <div>ERR_404</div>
      </div>

      <div class="err-code">4<em>0</em>4</div>

      <h1>Cette image n'a pas été <em>capturée</em>.</h1>
      <p>
        Le lien que vous suivez ne mène nulle part. Le projet a peut-être été déplacé, ou l'URL est mal orthographiée.
      </p>

      <a href="/" class="cta">
        Retour vers l'objectif
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M13 6l6 6-6 6"/>
        </svg>
      </a>

      <div class="meta">
        Baye <span>Dame</span> · Vidéaste &amp; Photographe · Dakar
      </div>
    </div>
  </div>

  <script src="/analytics.js" defer></script>
</body>
</html>
